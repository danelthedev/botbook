{{define "content"}}
<div class="space-y-4">
    <h1 class="text-2xl font-bold">PostgreSQL Tables</h1>

    {{if .Error}}
        <div class="alert alert-error">
            <span>{{.Error}}</span>
        </div>
    {{else if .Tables}}
        <div class="overflow-x-auto">
            <table class="table w-full">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Table Name</th>
                    </tr>
                </thead>
                <tbody>
                    {{range $i, $t := .Tables}}
                        {{template "tableRow" (dict "Index" (add $i 1) "Name" $t)}}
                    {{end}}
                </tbody>
            </table>
        </div>
    {{else}}
        <p class="text-gray-500">No tables found in the public schema.</p>
    {{end}}
</div>
{{end}}
