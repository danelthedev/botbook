{{define "content"}}
<div class="space-y-4">

    {{range .Cards}}
        {{template "card" .}}
    {{end}}

    <div class="flex gap-2">
        {{template "badge" "Go"}}
        {{template "badge" "HTMX"}}
        {{template "badge" "Templates"}}
    </div>

    <button
        hx-get="/clicked"
        hx-target="#result"
        hx-swap="innerHTML"
        class="btn btn-primary">
        Click Me
    </button>
    <div id="result"></div>

</div>
{{end}}
